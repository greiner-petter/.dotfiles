[main]
shell=fish
title = "Foot@CachyOS"
font=JetBrains Mono Nerd Font:size=11
letter-spacing=0
dpi-aware=no
pad=25x25
bold-text-in-bright=yes

[scrollback]
lines=10000

[cursor]
style=beam
beam-thickness=1.5

[colors-dark]
alpha=0.8

[key-bindings]
scrollback-up-page=Page_Up
scrollback-down-page=Page_Down
search-start=Control+Shift+f

[search-bindings]
cancel=Escape
find-prev=Shift+F3
find-next=F3 Control+G
