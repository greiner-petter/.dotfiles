[main]
shell=fish
title = "Foot@CachyOS"
font=JetBrains Mono Nerd Font:size=11
letter-spacing=0
dpi-aware=no
pad=25x25
bold-text-in-bright=yes

[scrollback]
lines=10000

[cursor]
style=beam
beam-thickness=1.5

[colors]
alpha=0.8

# Tomorrow Night Bright Colors
background=1d1f21
foreground=c5c8c6

# Normal/Regular Colors
regular0=191919  # black
regular1=A54141  # red
regular2=8BA257  # green
regular3=EAB771  # yellow
regular4=6799AE  # blue
regular5=A37199  # magenta
regular6=71AEA3  # cyan
regular7=CFCFCF  # white

# Bright Colors
bright0=686868   # bright black
bright1=BD5353   # bright red
bright2=A3BC70   # bright green
bright3=F3C283   # bright yellow
bright4=7DB1C0   # bright blue
bright5=BA87B1   # bright magenta
bright6=8ECABB   # bright cyan
bright7=EEEEEE   # bright white

[key-bindings]
scrollback-up-page=Page_Up
scrollback-down-page=Page_Down
search-start=Control+Shift+f

[search-bindings]
cancel=Escape
find-prev=Shift+F3
find-next=F3 Control+G
