[main]
shell=fish
title = "Foot@CachyOS"
font=JetBrains Mono Nerd Font:size=11
letter-spacing=0
dpi-aware=no
pad=25x25
bold-text-in-bright=yes

[scrollback]
lines=10000

[cursor]
style=beam
beam-thickness=1.5

[colors]
alpha=0.8

# Tomorrow Night Bright Colors
background=1d1f21
foreground=c5c8c6

# Normal/Regular Colors
regular0=181818  # black
regular1=AC4242  # red
regular2=90A959  # green
regular3=F4BF75  # yellow
regular4=6A9FB5  # blue
regular5=AA759F  # magenta
regular6=75B5AA  # cyan
regular7=D8D8D8  # white

# Bright Colors
bright0=6B6B6B   # bright black
bright1=C55555   # bright red
bright2=AAC474   # bright green
bright3=FECA88   # bright yellow
bright4=82B8C8   # bright blue
bright5=C28CB8   # bright magenta
bright6=93D3C3   # bright cyan
bright7=F8F8F8   # bright white

[key-bindings]
scrollback-up-page=Page_Up
scrollback-down-page=Page_Down
search-start=Control+Shift+f

[search-bindings]
cancel=Escape
find-prev=Shift+F3
find-next=F3 Control+G
